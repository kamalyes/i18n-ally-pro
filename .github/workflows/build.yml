name: Build & Package

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Type check
        run: npx tsc --noEmit

      - name: 🏗️ Build with env
        env:
          BUILTIN_DEEPL_API_KEY: ${{ secrets.BUILTIN_DEEPL_API_KEY }}
        run: npm run build

      - name: 📦 Package VSIX
        run: npx vsce package --allow-missing-repository

      - name: 📤 Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: i18n-ally-pro-${{ github.ref_name }}
          path: '*.vsix'
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: i18n-ally-pro-${{ github.ref_name }}
          path: ./vsix

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./vsix/*.vsix
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build with env
        env:
          BUILTIN_DEEPL_API_KEY: ${{ secrets.BUILTIN_DEEPL_API_KEY }}
        run: npm run build

      - name: 🚀 Publish to VS Code Marketplace
        run: npx vsce publish --allow-missing-repository
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: 🚀 Publish to Open VSX Registry
        run: npx ovsx publish --allow-missing-repository
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        continue-on-error: true
